# Modular RAG Configuration
# This file controls which modules are active and their parameters

pipeline:
  type: modular  # or 'simple'

knowledge_base:
  description: "the team's graduation project workspace, including project plans, meeting notes, team member information, task assignments, technical decisions, and development guidelines"
  domain: "team collaboration and project management"

embedding:
  provider: "huggingface"
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  dimension: 384
  normalize: true

retriever:
  top_k: 8
  dense_weight: 0.7
  sparse_weight: 0.3
  retrieval_method: "hybrid"

reranker:
  enabled: false  # Disabled to avoid quota/resource issues by default
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_n: 5

generator:
  provider: "openai" # Note: This still requires quota for answering
  model_name: gpt-4o-mini
  temperature: 0.1
  max_tokens: 500

query_processor:
  enabled: false  # Disabled to avoid OpenAI calls during retrieval

orchestration:
  routing_enabled: false  # Disabled to avoid OpenAI calls during routing
  max_iterations: 3

chunking:
  strategy: "recursive" # Switched from semantic to avoid embedding calls during chunking

milvus:
  collection_name: "rag_local"
  dimension: 384  # Must match the new embedding dimension
