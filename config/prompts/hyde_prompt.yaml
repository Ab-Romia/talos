name: hyde_prompt
description: Prompt for generating hypothetical document embeddings (HyDE)

input_variables:
  - question

template: |
  Given the following question, write a detailed paragraph that would be the ideal answer.
  The paragraph should contain specific information and facts that would help answer the question.
  Write as if this is an excerpt from an authoritative document.

  Question: {question}

  Ideal Answer Paragraph:
