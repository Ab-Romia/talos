# Production-Ready RAG Configuration
# All parameters are configurable - zero hardcoding

# Pipeline type
pipeline_type: modular

# Knowledge base metadata
knowledge_base:
  description: "Graduation project knowledge base for team collaboration"
  domain: "team collaboration and project management"
  source_paths: []

# Milvus Vector Database Configuration
milvus:
  host: localhost
  port: 19530
  database: default
  collection_name: rag_collection
  dimension: 1536  # Must match embedding model dimension
  index_type: HNSW  # Options: IVF_FLAT, IVF_SQ8, HNSW, DISKANN, AUTOINDEX
  metric_type: COSINE  # Options: L2, IP, COSINE
  index_params:
    M: 16
    efConstruction: 256
  search_params:
    ef: 64
  consistency_level: Bounded
  pool_size: 10
  timeout: 30.0

# Embedding Configuration
embedding:
  provider: openai  # Options: openai, huggingface, cohere, sentence_transformers
  model_name: text-embedding-3-small
  dimension: 1536
  batch_size: 32
  max_retries: 3
  normalize: true
  api_key_env: OPENAI_API_KEY

# Retriever Configuration
retriever:
  top_k: 10
  retrieval_method: hybrid  # Options: dense, sparse, hybrid
  dense_weight: 0.7
  sparse_weight: 0.3
  rrf_k: 60
  similarity_threshold: 0.0
  use_metadata_filter: false

# Reranker Configuration (Two-Stage Retrieval)
reranker:
  enabled: true
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_n: 5
  batch_size: 32
  relevance_threshold: 0.0
  use_gpu: false

# CLaRa-Inspired Context Compression
compression:
  enabled: false  # Enable for context compression
  method: llm_extractor  # Options: llm_extractor, embeddings_filter, llm_chain_filter
  compression_ratio: 0.5
  similarity_threshold: 0.75

# LLM Generator Configuration
generator:
  provider: openai  # Options: openai, anthropic, azure_openai
  model_name: gpt-4o-mini
  temperature: 0.1
  max_tokens: 1000
  top_p: 1.0
  frequency_penalty: 0.0
  presence_penalty: 0.0
  api_key_env: OPENAI_API_KEY
  timeout: 60.0
  max_retries: 3
  stream: false

# Query Processing Configuration
query_processor:
  enabled: true
  rewriting: true
  expansion: true
  hyde: false  # Hypothetical Document Embedding
  step_back: false  # Step-back prompting
  decomposition: false  # Query decomposition
  multi_query: false
  num_generated_queries: 3

# Orchestration Configuration
orchestration:
  routing_enabled: true
  max_iterations: 3
  answer_completeness_threshold: 0.8
  enable_self_reflection: false
  workflow_type: adaptive  # Options: simple, adaptive, self_reflective

# Document Chunking Configuration
chunking:
  strategy: semantic  # Options: fixed, semantic, recursive, sentence, markdown
  chunk_size: 1000
  chunk_overlap: 200
  min_chunk_size: 100
  max_chunk_size: 2000
  separators:
    - "\n\n"
    - "\n"
    - ". "
    - " "
    - ""
  breakpoint_threshold_type: percentile  # Options: percentile, standard_deviation, interquartile
  breakpoint_threshold_amount: 95.0

# Conversation Memory Configuration
memory:
  enabled: true
  max_history: 10
  include_context_in_history: false
  summary_enabled: false
  summary_threshold: 5

# Logging Configuration
logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: null  # Set to file path to enable file logging
  enable_rich: true
  enable_metrics: true

# Prompt Templates
prompts:
  qa_template_path: config/prompts/qa_prompt.yaml
  rewrite_template_path: config/prompts/query_rewrite_prompt.yaml
  hyde_template_path: config/prompts/hyde_prompt.yaml
  system_prompt: null  # Override system prompt if needed
