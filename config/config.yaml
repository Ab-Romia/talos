auth:
  jwt_header: { "alg": "dir", "enc": "A256GCM" }
  sudo_max_age: PT10M
  session_max_age: P30D
  session_refresh_threshold: PT10M

  totp_valid_window: 1

  oauth_clients:
    google:
      api_base_url: https://www.googleapis.com/oauth2/v2/
      access_token_url: https://oauth2.googleapis.com/token
      authorize_url: https://accounts.google.com/o/oauth2/v2/auth
      server_metadata_url: https://accounts.google.com/.well-known/openid-configuration
      client_kwargs: { "scope": "openid email profile https://www.googleapis.com/auth/drive.file" }
    github:
      api_base_url: https://api.github.com/
      access_token_url: https://github.com/login/oauth/access_token
      authorize_url: https://github.com/login/oauth/authorize
      client_kwargs: { "scope": "read:user user:email" }
database:
  host: localhost
  port: 5432
minio:
  public_endpoint: http://172.20.0.4:9000
  internal_endpoint: http://172.20.0.4:9000
  bucket_name: talos

