worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Raise upload limit to match FilesConfig.max_size (50 MiB) plus headroom
    client_max_body_size 100m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS + HTTP/2 ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options    nosniff;
        add_header X-Frame-Options           DENY;

        # ── React SPA (static) ────────────────────────────────────────────────
        root  /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── FastAPI (all API + auth routes) ───────────────────────────────────
        location /api/ {
            proxy_pass         http://app:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Disable buffering so SSE chat chunks stream immediately
            proxy_buffering    off;
            proxy_read_timeout 3600s;
        }

        # ── MinIO presigned URL pass-through ──────────────────────────────────
        # Presigned URLs are signed with Host=<this server's hostname>.
        # proxy_set_header Host $host forwards that exact host to MinIO so its
        # SigV4 HMAC verification succeeds (scheme is not part of the string-to-sign).
        location /talos-uploads/ {
            proxy_pass       http://minio:9000;
            proxy_set_header Host $host;
        }
    }
}
