<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1180" height="640" fill="#ffffff"/><text x="60" y="40" font-size="11" fill="#8a8f99" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-weight="bold">A message:</text><text x="150" y="40" font-size="12" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">“Hey @Kyria, see the report”</text><rect x="60" y="64" width="470" height="300" rx="10" fill="#ffffff" stroke="#2c8c9a" stroke-width="1.6"/><rect x="60" y="64" width="470" height="26" rx="10" fill="#e7f2f4"/><rect x="60" y="78" width="470" height="12" rx="0" fill="#e7f2f4"/><text x="73" y="82" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">content  —  JSONB document tree</text><rect x="84" y="93" width="8" height="8" rx="2" fill="#6b7480"/><text x="100" y="100" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">doc</text><rect x="110" y="127" width="8" height="8" rx="2" fill="#6b7480"/><text x="126" y="134" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">paragraph</text><line x1="97" y1="116" x2="97" y2="134" stroke="#cbd0d7" stroke-width="1.2"/><line x1="97" y1="131" x2="110" y2="131" stroke="#cbd0d7" stroke-width="1.2"/><rect x="136" y="161" width="8" height="8" rx="2" fill="#2c8c9a"/><text x="152" y="168" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">text  "Hey "</text><line x1="123" y1="150" x2="123" y2="168" stroke="#cbd0d7" stroke-width="1.2"/><line x1="123" y1="165" x2="136" y2="165" stroke="#cbd0d7" stroke-width="1.2"/><rect x="136" y="195" width="8" height="8" rx="2" fill="#c4913a"/><text x="152" y="202" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">mention  {user_id:"019f…", label:"Kyria"}</text><line x1="123" y1="184" x2="123" y2="202" stroke="#cbd0d7" stroke-width="1.2"/><line x1="123" y1="199" x2="136" y2="199" stroke="#cbd0d7" stroke-width="1.2"/><rect x="136" y="229" width="8" height="8" rx="2" fill="#2c8c9a"/><text x="152" y="236" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">text  ", see the report"</text><line x1="123" y1="218" x2="123" y2="236" stroke="#cbd0d7" stroke-width="1.2"/><line x1="123" y1="233" x2="136" y2="233" stroke="#cbd0d7" stroke-width="1.2"/><text x="84" y="340" font-size="9.6" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">Structural nodes/attrs vs. user-visible text values.</text><rect x="560" y="64" width="560" height="300" rx="10" fill="#ffffff" stroke="#c23b6b" stroke-width="1.6"/><rect x="560" y="64" width="560" height="26" rx="10" fill="#fbe7ef"/><rect x="560" y="78" width="560" height="12" rx="0" fill="#fbe7ef"/><text x="573" y="82" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">content::text  —  what ILIKE '%q%' scans</text><rect x="578" y="90" width="61.2" height="20" rx="3" fill="#fbe7ef"/><text x="581" y="104" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">{"type":</text><rect x="642.2" y="90" width="40.5" height="20" rx="3" fill="#fbe7ef"/><text x="645.2" y="104" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">"doc"</text><rect x="685.7" y="90" width="144.0" height="20" rx="3" fill="#fbe7ef"/><text x="688.7" y="104" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">,"content":[{"type":</text><rect x="832.7" y="90" width="81.9" height="20" rx="3" fill="#fbe7ef"/><text x="835.7" y="104" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">"paragraph"</text><rect x="917.6" y="90" width="88.80000000000001" height="20" rx="3" fill="#fbe7ef"/><text x="920.6" y="104" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">,"content":[</text><rect x="578" y="116" width="157.8" height="20" rx="3" fill="#fbe7ef"/><text x="581" y="130" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">{"type":"text","text":</text><rect x="738.8" y="116" width="47.400000000000006" height="20" rx="3" fill="#e6f3ea"/><text x="741.8" y="130" font-size="10.5" fill="#2c6b3f" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">"Hey "</text><rect x="789.1999999999999" y="116" width="19.8" height="20" rx="3" fill="#fbe7ef"/><text x="792.1999999999999" y="130" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">},</text><rect x="811.9999999999999" y="116" width="185.4" height="20" rx="3" fill="#fbe7ef"/><text x="814.9999999999999" y="130" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">{"type":"mention","attrs":</text><rect x="1000.3999999999999" y="116" width="81.9" height="20" rx="3" fill="#fbe7ef"/><text x="1003.3999999999999" y="130" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">{"user_id":</text><rect x="578" y="142" width="88.80000000000001" height="20" rx="3" fill="#fbf2de"/><text x="581" y="156" font-size="10.5" fill="#7a5a10" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">"019f2e1d-…"</text><rect x="669.8" y="142" width="68.1" height="20" rx="3" fill="#fbe7ef"/><text x="672.8" y="156" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">,"label":</text><rect x="740.9" y="142" width="54.300000000000004" height="20" rx="3" fill="#e6f3ea"/><text x="743.9" y="156" font-size="10.5" fill="#2c6b3f" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">"Kyria"</text><rect x="798.1999999999999" y="142" width="26.700000000000003" height="20" rx="3" fill="#fbe7ef"/><text x="801.1999999999999" y="156" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">}},</text><rect x="827.9" y="142" width="157.8" height="20" rx="3" fill="#fbe7ef"/><text x="830.9" y="156" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">{"type":"text","text":</text><rect x="578" y="168" width="130.2" height="20" rx="3" fill="#e6f3ea"/><text x="581" y="182" font-size="10.5" fill="#2c6b3f" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">", see the report"</text><rect x="711.2" y="168" width="40.5" height="20" rx="3" fill="#fbe7ef"/><text x="714.2" y="182" font-size="10.5" fill="#8a3b57" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">}]}]}</text><rect x="578" y="211" width="14" height="14" rx="3" fill="#fbe7ef" stroke="#8a3b57" stroke-width="1.2"/><text x="598" y="222" font-size="10" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">structural (node types, keys, attrs)</text><rect x="578" y="233" width="14" height="14" rx="3" fill="#e6f3ea" stroke="#2c6b3f" stroke-width="1.2"/><text x="598" y="244" font-size="10" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">user-visible text</text><rect x="578" y="255" width="14" height="14" rx="3" fill="#fbf2de" stroke="#7a5a10" stroke-width="1.2"/><text x="598" y="266" font-size="10" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">UUID (mention user_id)</text><rect x="60" y="400" width="530" height="150" rx="10" fill="#fbe7ef" stroke="#c23b6b" stroke-width="1.5"/><text x="78" y="426" font-size="12.5" fill="#8a3b57" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-weight="bold">False positives</text><text x="78" y="450" font-size="10.4" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">Query “text”, “paragraph”, or “mention” matches the</text><text x="78" y="470" font-size="10.4" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">structural node-type tokens — it hits every message.</text><text x="78" y="490" font-size="10.4" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">A UUID fragment matches mention user_id / attrs, not</text><text x="78" y="510" font-size="10.4" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">anything the reader ever typed.</text><rect x="610" y="400" width="510" height="150" rx="10" fill="#fbf2de" stroke="#c4913a" stroke-width="1.5"/><text x="628" y="426" font-size="12.5" fill="#8a6420" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-weight="bold">False negatives</text><text x="628" y="450" font-size="10.4" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">User-visible text is split across sibling nodes, so a phrase</text><text x="628" y="470" font-size="10.4" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">that spans a mention or line break is not contiguous in the</text><text x="628" y="490" font-size="10.4" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">string: searching “Kyria,” fails — “Kyria” is a mention label</text><text x="628" y="510" font-size="10.4" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">and “,” starts the next text node.</text><text x="60" y="600" font-size="9.8" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">Casting the whole JSONB doc to text and matching with ILIKE is simple and index-light, but it conflates structure with content —</text><text x="60" y="615" font-size="9.8" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">the source of both false positives (structural tokens) and false negatives (text fragmented across nodes).</text></svg>