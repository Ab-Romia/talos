<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1180" height="560" fill="#ffffff"/><rect x="60" y="232" width="130" height="66" rx="9" fill="#eaf1fb" stroke="#3e6fb0" stroke-width="1.5"/><text x="125.0" y="262.0" font-size="13" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">Clients</text><text x="125.0" y="278.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">at scale</text><rect x="230" y="232" width="150" height="66" rx="9" fill="#eef0f3" stroke="#6b7480" stroke-width="1.5"/><text x="305.0" y="269.0" font-size="11.5" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">Load balancer</text><line x1="190" y1="265" x2="230" y2="265" stroke="#2b2f37" stroke-width="1.5"/><path d="M230.0,265.0 L221.5,269.7 L221.5,260.3 Z" fill="#2b2f37"/><rect x="430" y="190" width="150" height="48" rx="9" fill="#ffffff" stroke="#6b7480" stroke-width="1.5"/><text x="505.0" y="218.0" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">API instance</text><rect x="430" y="258" width="150" height="48" rx="9" fill="#ffffff" stroke="#6b7480" stroke-width="1.5"/><text x="505.0" y="286.0" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">API instance</text><line x1="380" y1="258" x2="430" y2="214" stroke="#2b2f37" stroke-width="1.5"/><path d="M430.0,214.0 L426.7,223.1 L420.5,216.1 Z" fill="#2b2f37"/><line x1="380" y1="272" x2="430" y2="282" stroke="#2b2f37" stroke-width="1.5"/><path d="M430.0,282.0 L420.7,284.9 L422.6,275.7 Z" fill="#2b2f37"/><rect x="640" y="70" width="200" height="110" rx="10" fill="#ffffff" stroke="#c4913a" stroke-width="1.6"/><rect x="640" y="70" width="200" height="26" rx="10" fill="#fbf2de"/><rect x="640" y="84" width="200" height="12" rx="0" fill="#fbf2de"/><text x="653" y="88" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">Cache layer</text><text x="650" y="104" font-size="10" fill="#8a6420" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">response / semantic</text><text x="650" y="120" font-size="10" fill="#8a6420" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">cache — in front of</text><text x="650" y="136" font-size="10" fill="#8a6420" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">the inference service</text><text x="650" y="160" font-size="9.4" fill="#8a8f99" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">hit → skip inference</text><rect x="640" y="210" width="200" height="150" rx="10" fill="#ffffff" stroke="#c23b6b" stroke-width="1.6"/><rect x="640" y="210" width="200" height="26" rx="10" fill="#fbe7ef"/><rect x="640" y="224" width="200" height="12" rx="0" fill="#fbe7ef"/><text x="653" y="228" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">Inference service</text><rect x="655" y="250" width="170" height="40" rx="9" fill="#ffffff" stroke="#c23b6b" stroke-width="1.5"/><text x="740.0" y="274.0" font-size="10" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">L