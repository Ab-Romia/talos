oke="#2c8c9a" stroke-width="1.4"/><text x="963" y="214" font-size="10" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">shard 1</text><path d="M918,242 A45,10 0 0 1 1008,242 L1008,276 A45,10 0 0 1 918,276 Z" fill="#e7f2f4" stroke="#2c8c9a" stroke-width="1.4"/><path d="M918,242 A45,10 0 0 0 1008,242" fill="none" stroke="#2c8c9a" stroke-width="1.4"/><text x="963" y="266" font-size="10" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">shard 2</text><path d="M918,294 A45,10 0 0 1 1008,294 L1008,328 A45,10 0 0 1 918,328 Z" fill="#e7f2f4" stroke="#2c8c9a" stroke-width="1.4"/><path d="M918,294 A45,10 0 0 0 1008,294" fill="none" stroke="#2c8c9a" stroke-width="1.4"/><text x="963" y="318" font-size="10" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">shard 3</text><text x="1088" y="200" font-size="14" fill="#5b6472" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">…</text><line x1="840" y1="285" x2="900" y2="255" stroke="#2c8c9a" stroke-width="1.5"/><path d="M900.0,255.0 L894.5,263.0 L890.3,254.6 Z" fill="#2c8c9a"/><rect x="842.6" y="253.0" width="54.8" height="15" rx="3" fill="#ffffff" opacity="0.92"/><text x="870.0" y="264.0" font-size="9.2" fill="#404757" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">retrieve</text><line x1="60" y1="452" x2="1120" y2="452" stroke="#e9ebef" stroke-width="1"/><text x="60" y="474" font-size="9.8" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">Proposed scaling path (Ch. IX): a cache layer fronts a distributed, autoscaled inference pool so repeat / cacheable requests skip the model entirely,</text><text x="60" y="490" font-size="9.8" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">while the vector store is sharded across nodes — letting the platform serve organizations well beyond the validation scale. All boxes are future work.</text></svg>