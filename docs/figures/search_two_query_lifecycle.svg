<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1180" height="560" fill="#ffffff"/><rect x="60" y="210" width="160" height="70" rx="9" fill="#eaf1fb" stroke="#3e6fb0" stroke-width="1.5"/><text x="140.0" y="242.0" font-size="13" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">Client</text><text x="140.0" y="258.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">GET /messages/search</text><text x="140" y="300" font-size="9.6" fill="#5b6472" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">?q=report&amp;page=2</text><text x="140" y="314" font-size="9.6" fill="#5b6472" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">&amp;page_size=20</text><rect x="270" y="200" width="210" height="96" rx="10" fill="#ffffff" stroke="#6b7480" stroke-width="1.6"/><rect x="270" y="200" width="210" height="26" rx="10" fill="#eef0f3"/><rect x="270" y="214" width="210" height="12" rx="0" fill="#eef0f3"/><text x="283" y="218" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">router  (in)</text><text x="280" y="232" font-size="10" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">page 2, page_size 20</text><text x="280" y="252" font-size="10" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">→ offset = (2-1)·20 = 20</text><text x="280" y="268" font-size="10" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">→ limit  = 20</text><text x="280" y="286" font-size="9" fill="#8a8f99" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">page arithmetic stays here</text><line x1="220" y1="245" x2="270" y2="245" stroke="#2b2f37" stroke-width="1.5"/><path d="M270.0,245.0 L261.5,249.7 L261.5,240.3 Z" fill="#2b2f37"/><rect x="540" y="150" width="250" height="210" rx="10" fill="#ffffff" stroke="#2e7d46" stroke-width="1.6"/><rect x="540" y="150" width="250" height="26" rx="10" fill="#e6f3ea"/><rect x="540" y="164" width="250" height="12" rx="0" fill="#e6f3ea"/><text x="553" y="168" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">search_messages()</text><rect x="556" y="190" width="218" height="62" rx="9" fill="#ffffff" stroke="#2e7d46" stroke-width="1.5"/><text x="665.0" y="218.0" font-size="11.5" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">① COUNT(*)</text><text x="665.0" y="234.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">over filtered set → total = 137</text><rect x="556" y="264" width="218" height="80" rx="9" fill="#ffffff" stroke="#2e7d46" stroke-width="1.5"/><text x="665" y="286" font-size="11.5" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">② SELECT …</text><text x="665" y="305" font-size="9.2" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">WHERE filters</text><text x="665" y="320" font-size="9.2" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">ORDER BY sent_at DESC</text><text x="665" y="335" font-size="9.2" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">LIMIT 20 OFFSET 20</text><line x1="480" y1="245" x2="540" y2="245" stroke="#2b2f37" stroke-width="1.5"/><path d="M540.0,245.0 L531.5,249.7 L531.5,240.3 Z" fill="#2b2f37"/><rect x="465.8" y="228.0" width="88.39999999999999" height="15" rx="3" fill="#ffffff" opacity="0.92"/><text x="510.0" y="239.0" font-size="9.2" fill="#404757" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">offset / limit</text><path d="M840,175 A55,13 0 0 1 950,175 L950,330 A55,13 0 0 1 840,330 Z" fill="#e7f2f4" stroke="#2c8c9a" stroke-width="1.6"/><path d="M840,175 A55,13 0 0 0 950,175" fill="none" stroke="#2c8c9a" stroke-width="1.6"/><text x="895" y="210" font-size="12.5" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">Postgres</text><text x="895" y="232" font-size="10" fill="#5b6472" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">messages</text><line x1="774" y1="221" x2="840" y2="221" stroke="#2c8c9a" stroke-width="1.5"/><path d="M840.0,221.0 L831.5,225.7 L831.5,216.3 Z" fill="#2c8c9a"/><rect x="788.0" y="204.0" width="38.0" height="15" rx="3" fill="#ffffff" opacity="0.92"/><text x="807.0" y="215.0" font-size="9.2" fill="#404757" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">count</text><line x1="774" y1="303" x2="840" y2="300" stroke="#2c8c9a" stroke-width="1.5"/><path d="M840.0,300.0 L831.7,305.1 L831.3,295.7 Z" fill="#2c8c9a"/><rect x="788.0" y="284.5" width="38.0" height="15" rx="3" fill="#ffffff" opacity="0.92"/><text x="807.0" y="295.5" font-size="9.2" fill="#404757" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">fetch</text><rect x="60" y="380" width="1060" height="120" rx="10" fill="#ffffff" stroke="#3e6fb0" stroke-width="1.6"/><rect x="60" y="380" width="1060" height="26" rx="10" fill="#eaf1fb"/><rect x="60" y="394" width="1060" height="12" rx="0" fill="#eaf1fb"/><text x="73" y="398" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">router  (out)  —  reproject + assemble response envelope</text><text x="74" y="412" font-size="10.5" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">MessageSchema[]  →  ChatMessageResponse[]</text><text x="74" y="430" font-size="9.6" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">(internal model never leaks; content passed through as raw ProseMirror JSON)</text><rect x="74" y="444" width="1030" height="40" rx="6" fill="#ffffff" stroke="#cbd0d7" stroke-width="1.3"/><text x="90" y="468" font-size="10.5" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">{ results:[…20], page:2, page_size:20, total:137, total_pages:7, has_next:true, has_previous:true }</text><line x1="665" y1="360" x2="665" y2="380" stroke="#2b2f37" stroke-width="1.5"/><path d="M665.0,380.0 L660.3,371.5 L669.7,371.5 Z" fill="#2b2f37"/><text x="60" y="528" font-size="9.8" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">Two round-trips (COUNT then SELECT) instead of a COUNT(*) OVER() window — chosen for readability, at the cost of one extra query and a small</text><text x="60" y="543" font-size="9.8" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">consistency window: a message inserted between the two queries can shift a page boundary by one row (accepted for channel-history search).</text></svg>