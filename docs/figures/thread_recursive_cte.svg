<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="616" viewBox="0 0 1180 616" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1180" height="616" fill="#ffffff"/><rect x="60" y="44" width="1060" height="132" rx="10" fill="#fbfbfa" stroke="#5a46a8" stroke-width="1.6"/><rect x="60" y="44" width="1060" height="26" rx="10" fill="#eeeaf8"/><rect x="60" y="58" width="1060" height="12" rx="0" fill="#eeeaf8"/><text x="73" y="62" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">get_thread()  —  single recursive CTE, one round-trip at any depth</text><text x="80" y="88" font-size="10.5" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">WITH RECURSIVE thread AS (</text><text x="80" y="103" font-size="10.5" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">    SELECT * FROM messages WHERE id = :root_id            -- anchor (base case)</text><text x="80" y="118" font-size="10.5" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">  UNION ALL</text><text x="80" y="133" font-size="10.5" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">    SELECT m.* FROM messages m</text><text x="80" y="148" font-size="10.5" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">    JOIN thread t ON m.reply_to_id = t.id                 -- recurse on the self-FK</text><text x="80" y="163" font-size="10.5" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">)  SELECT * FROM thread;</text><line x1="60" y1="220" x2="1120" y2="220" stroke="#e9ebef" stroke-width="1"/><text x="60" y="240" font-size="12" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-weight="bold">① Anchor</text><rect x="130" y="260" width="110" height="44" rx="9" fill="#eeeaf8" stroke="#5a46a8" stroke-width="1.5"/><text x="185.0" y="279.0" font-size="12.5" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">M1</text><text x="185.0" y="295.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">root</text><text x="64" y="332" font-size="9.6" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">SELECT the root</text><text x="64" y="346" font-size="9.6" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">message row.</text><text x="345" y="240" font-size="12" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-weight="bold">② Union passes</text><rect x="445" y="258" width="70" height="34" rx="9" fill="#eeeaf8" stroke="#5a46a8" stroke-width="1.5"/><text x="480.0" y="279.0" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">M1</text><rect x="385" y="314" width="70" height="34" rx="9" fill="#eaf1fb" stroke="#3e6fb0" stroke-width="1.5"/><text x="420.0" y="335.0" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">M2</text><rect x="505" y="314" width="70" height="34" rx="9" fill="#eaf1fb" stroke="#3e6fb0" stroke-width="1.5"/><text x="540.0" y="335.0" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">M3</text><rect x="385" y="370" width="70" height="34" rx="9" fill="#e7f2f4" stroke="#2c8c9a" stroke-width="1.5"/><text x="420.0" y="391.0" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">M4</text><line x1="480" y1="292" x2="420" y2="314" stroke="#2b2f37" stroke-width="1.2"/><line x1="480" y1="292" x2="540" y2="314" stroke="#2b2f37" stroke-width="1.2"/><line x1="420" y1="348" x2="420" y2="370" stroke="#2b2f37" stroke-width="1.2"/><text x="345" y="420" font-size="9" fill="#8a8f99" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">each UNION ALL pass adds one depth level;</text><text x="345" y="434" font-size="9" fill="#8a8f99" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">stop when a pass returns 0 rows.</text><text x="630" y="240" font-size="12" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-weight="bold">③ Flat result set</text><rect x="630" y="256" width="200" height="150" rx="8" fill="#ffffff" stroke="#cbd0d7" stroke-width="1.4"/><text x="646" y="278" font-size="10.5" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">id  reply_to_id</text><line x1="640" y1="284" x2="820" y2="284" stroke="#e9ebef" stroke-width="1"/><text x="646" y="304" font-size="10.5" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">M1   ∅</text><text x="646" y="326" font-size="10.5" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">M2   M1</text><text x="646" y="348" font-size="10.5" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">M3   M1</text><text x="646" y="370" font-size="10.5" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">M4   M2</text><text x="630" y="426" font-size="9.6" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">n rows, unordered — one query.</text><text x="930" y="240" font-size="12" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-weight="bold">④ Python tree — O(n)</text><rect x="930" y="256" width="250" height="150" rx="8" fill="#e6f3ea" stroke="#2e7d46" stroke-width="1.5"/><text x="946" y="276" font-size="10" fill="#2c6b3f" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">index rows by id → {id: node}</text><text x="946" y="291" font-size="10" fill="#2c6b3f" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">wire each non-root into</text><text x="946" y="306" font-size="10" fill="#2c6b3f" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">parent.children:</text><text x="946" y="321" font-size="10" fill="#2c6b3f" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start"></text><text x="946" y="336" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">M1</text><text x="946" y="352" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start"> ├─ M2</text><text x="946" y="368" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start"> │   └─ M4</text><text x="946" y="384" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start"> └─ M3</text><line x1="250" y1="296" x2="375" y2="296" stroke="#2b2f37" stroke-width="1.5"/><path d="M375.0,296.0 L366.5,300.7 L366.5,291.3 Z" fill="#2b2f37"/><line x1="580" y1="296" x2="624" y2="296" stroke="#2b2f37" stroke-width="1.5"/><path d="M624.0,296.0 L615.5,300.7 L615.5,291.3 Z" fill="#2b2f37"/><line x1="832" y1="296" x2="924" y2="296" stroke="#2b2f37" stroke-width="1.5"/><path d="M924.0,296.0 L915.5,300.7 L915.5,291.3 Z" fill="#2b2f37"/><line x1="60" y1="592" x2="1120" y2="592" stroke="#e9ebef" stroke-width="1"/><text x="60" y="610" font-size="9.8" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">The recursive CTE runs entirely in Postgres (one round-trip regardless of depth); the flat rows are then assembled into a nested reply tree in a single O(n) Python pass.</text></svg>