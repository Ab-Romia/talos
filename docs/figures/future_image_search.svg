<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1180" height="520" fill="#ffffff"/><rect x="48" y="70" width="1084" height="150" rx="12" fill="#fbfcfb" stroke="#2e7d46" stroke-width="1.4"/><text x="64" y="96" font-size="11" fill="#2c6b3f" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-weight="bold" letter-spacing="0.6">CURRENT  —  text-based pipeline</text><rect x="70" y="116" width="170" height="70" rx="9" fill="#e6f3ea" stroke="#2e7d46" stroke-width="1.5"/><text x="155.0" y="148.0" font-size="12" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">Documents</text><text x="155.0" y="164.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">PDF · DOCX · text</text><rect x="300" y="116" width="190" height="70" rx="9" fill="#ffffff" stroke="#2e7d46" stroke-width="1.5"/><text x="395.0" y="148.0" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">Text embedder</text><text x="395.0" y="164.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">all-MiniLM-L6-v2</text><line x1="240" y1="151" x2="300" y2="151" stroke="#2e7d46" stroke-width="1.5"/><path d="M300.0,151.0 L291.5,155.7 L291.5,146.3 Z" fill="#2e7d46"/><rect x="248.2" y="134.0" width="43.599999999999994" height="15" rx="3" fill="#ffffff" opacity="0.92"/><text x="270.0" y="145.0" font-size="9.2" fill="#404757" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">chunks</text><rect x="48" y="250" width="1084" height="150" rx="12" fill="#fefbf5" stroke="#c4913a" stroke-width="1.4" stroke-dasharray="7 5"/><text x="64" y="276" font-size="11" fill="#8a6420" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-weight="bold" letter-spacing="0.6">PROPOSED  —  image / multimodal branch</text><rect x="70" y="296" width="170" height="70" rx="9" fill="#fbf2de" stroke="#c4913a" stroke-width="1.5"/><text x="155.0" y="328.0" font-size="12" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">Images</text><text x="155.0" y="344.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">photos · figures · scans</text><rect x="300" y="296" width="190" height="70" rx="9" fill="#ffffff" stroke="#c4913a" stroke-width="1.5"/><text x="395.0" y="328.0" font-size="11" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">Image embedder</text><text x="395.0" y="344.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">CLIP-style multimodal</text><line x1="240" y1="331" x2="300" y2="331" stroke="#c4913a" stroke-width="1.5"/><path d="M300.0,331.0 L291.5,335.7 L291.5,326.3 Z" fill="#c4913a"/><path d="M620,190 A70,16 0 0 1 760,190 L760,290 A70,16 0 0 1 620,290 Z" fill="#e7f2f4" stroke="#2c8c9a" stroke-width="1.8"/><path d="M620,190 A70,16 0 0 0 760,190" fill="none" stroke="#2c8c9a" stroke-width="1.8"/><text x="690" y="226" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">Retrieval index</text><text x="690" y="245" font-size="10.5" fill="#5b6472" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">Milvus</text><text x="690" y="261" font-size="9.4" fill="#8a8f99" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-style="italic">one shared store</text><line x1="490" y1="151" x2="624" y2="214" stroke="#2e7d46" stroke-width="1.5"/><path d="M624.0,214.0 L614.3,214.6 L618.3,206.2 Z" fill="#2e7d46"/><rect x="532.4" y="165.5" width="49.199999999999996" height="15" rx="3" fill="#ffffff" opacity="0.92"/><text x="557.0" y="176.5" font-size="9.2" fill="#404757" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">vectors</text><line x1="490" y1="331" x2="624" y2="266" stroke="#c4913a" stroke-width="1.5" stroke-dasharray="6 4"/><path d="M624.0,266.0 L618.4,273.9 L614.3,265.5 Z" fill="#c4913a"/><rect x="532.4" y="281.5" width="49.199999999999996" height="15" rx="3" fill="#ffffff" opacity="0.92"/><text x="557.0" y="292.5" font-size="9.2" fill="#404757" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">vectors</text><rect x="830" y="150" width="150" height="62" rx="9" fill="#eaf1fb" stroke="#3e6fb0" stroke-width="1.5"/><text x="905.0" y="178.0" font-size="12" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">Query</text><text x="905.0" y="194.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">text or image</text><rect x="830" y="300" width="150" height="62" rx="9" fill="#eeeaf8" stroke="#5a46a8" stroke-width="1.5"/><text x="905.0" y="328.0" font-size="11.5" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">Ranked results</text><text x="905.0" y="344.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">same contract</text><line x1="830" y1="181" x2="760" y2="220" stroke="#3e6fb0" stroke-width="1.5"/><path d="M760.0,220.0 L765.1,211.8 L769.7,219.9 Z" fill="#3e6fb0"/><rect x="750.8" y="183.5" width="88.39999999999999" height="15" rx="3" fill="#ffffff" opacity="0.92"/><text x="795.0" y="194.5" font-size="9.2" fill="#404757" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">embed → search</text><line x1="760" y1="250" x2="830" y2="320" stroke="#5a46a8" stroke-width="1.5"/><path d="M830.0,320.0 L820.7,317.3 L827.3,310.7 Z" fill="#5a46a8"/><rect x="776.0" y="268.0" width="38.0" height="15" rx="3" fill="#ffffff" opacity="0.92"/><text x="795.0" y="279.0" font-size="9.2" fill="#404757" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">top-k</text><text x="48" y="452" font-size="9.8" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">The proposed image branch reuses the same retrieval index and query contract as the text pipeline: only the embedding model changes.</text><text x="48" y="468" font-size="9.8" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">A multimodal embedder maps images into the same vector space, so a single similarity search spans text and image content.</text><text x="48" y="496" font-size="9.4" fill="#8a8f99" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">Dashed = proposed / future work.</text></svg>