<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="600" viewBox="0 0 1180 600" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1180" height="600" fill="#ffffff"/><rect x="60" y="250" width="150" height="66" rx="9" fill="#eaf1fb" stroke="#3e6fb0" stroke-width="1.5"/><text x="135.0" y="280.0" font-size="13" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">Sender</text><text x="135.0" y="296.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">web · mobile · script</text><rect x="250" y="190" width="210" height="46" rx="9" fill="#eef0f3" stroke="#6b7480" stroke-width="1.5"/><text x="355.0" y="210.0" font-size="11.5" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">message  event</text><text x="355.0" y="226.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">Socket.IO</text><rect x="250" y="300" width="210" height="46" rx="9" fill="#eef0f3" stroke="#6b7480" stroke-width="1.5"/><text x="355.0" y="320.0" font-size="11.5" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle" font-weight="bold">POST /messages</text><text x="355.0" y="336.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">REST</text><line x1="210" y1="274" x2="250" y2="213" stroke="#2b2f37" stroke-width="1.5"/><path d="M250.0,213.0 L249.2,222.7 L241.4,217.5 Z" fill="#2b2f37"/><line x1="210" y1="292" x2="250" y2="323" stroke="#2b2f37" stroke-width="1.5"/><path d="M250.0,323.0 L240.4,321.5 L246.1,314.1 Z" fill="#2b2f37"/><rect x="500" y="214" width="210" height="118" rx="10" fill="#ffffff" stroke="#2e7d46" stroke-width="1.6"/><rect x="500" y="214" width="210" height="26" rx="10" fill="#e6f3ea"/><rect x="500" y="228" width="210" height="12" rx="0" fill="#e6f3ea"/><text x="513" y="232" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">store_message()</text><text x="510" y="250" font-size="9.6" fill="#2c6b3f" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">· validate (MessageCreateSchema)</text><text x="510" y="270" font-size="9.6" fill="#2c6b3f" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">· persist → set_content()</text><text x="510" y="290" font-size="9.6" fill="#2c6b3f" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">· extract mentioned_user_ids</text><text x="605" y="320" font-size="9" fill="#8a8f99" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-style="italic">one shared service</text><line x1="460" y1="213" x2="500" y2="250" stroke="#2b2f37" stroke-width="1.5"/><path d="M500.0,250.0 L490.6,247.7 L496.9,240.8 Z" fill="#2b2f37"/><line x1="460" y1="323" x2="500" y2="290" stroke="#2b2f37" stroke-width="1.5"/><path d="M500.0,290.0 L496.4,299.0 L490.5,291.8 Z" fill="#2b2f37"/><rect x="800" y="90" width="320" height="150" rx="10" fill="#ffffff" stroke="#3e6fb0" stroke-width="1.6"/><rect x="800" y="90" width="320" height="26" rx="10" fill="#eaf1fb"/><rect x="800" y="104" width="320" height="12" rx="0" fill="#eaf1fb"/><text x="813" y="108" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">room  channel:{id}</text><text x="812" y="122" font-size="10" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">sio.send(payload, skip_sid=sender)</text><text x="812" y="138" font-size="9.6" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">broadcast to every subscriber — except</text><text x="812" y="151" font-size="9.6" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">the sender (they already have it).</text><rect x="812" y="168" width="90" height="56" rx="9" fill="#ffffff" stroke="#6b7480" stroke-width="1.5"/><text x="857.0" y="193.0" font-size="10.5" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">member</text><text x="857.0" y="209.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">online</text><rect x="912" y="168" width="90" height="56" rx="9" fill="#ffffff" stroke="#6b7480" stroke-width="1.5"/><text x="957.0" y="193.0" font-size="10.5" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">member</text><text x="957.0" y="209.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">online</text><rect x="1012" y="168" width="96" height="56" rx="9" fill="#fbe7ef" stroke="#c23b6b" stroke-width="1.5"/><text x="1060.0" y="193.0" font-size="10.5" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">sender</text><text x="1060.0" y="209.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">skipped</text><rect x="800" y="268" width="320" height="132" rx="10" fill="#ffffff" stroke="#c4913a" stroke-width="1.6"/><rect x="800" y="268" width="320" height="26" rx="10" fill="#fbf2de"/><rect x="800" y="282" width="320" height="12" rx="0" fill="#fbf2de"/><text x="813" y="286" font-size="12" fill="#1b2130" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start" font-weight="bold">room  user:{uid}   (per mention)</text><text x="812" y="300" font-size="10" fill="#33405a" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="start">flag-modified payload → personal room</text><text x="812" y="316" font-size="9.6" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start">of each mentioned user (notification).</text><rect x="812" y="332" width="140" height="52" rx="9" fill="#fbf2de" stroke="#c4913a" stroke-width="1.5"/><text x="882.0" y="355.0" font-size="11" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">@Kyria</text><text x="882.0" y="371.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">user:019f…</text><rect x="962" y="332" width="146" height="52" rx="9" fill="#fbf2de" stroke="#c4913a" stroke-width="1.5"/><text x="1035.0" y="355.0" font-size="11" fill="#1b2130" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="bold">@Mohab</text><text x="1035.0" y="371.0" font-size="9.5" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">user:019f…</text><line x1="710" y1="250" x2="800" y2="165" stroke="#3e6fb0" stroke-width="1.5"/><path d="M800.0,165.0 L797.0,174.2 L790.6,167.4 Z" fill="#3e6fb0"/><rect x="724.8" y="190.5" width="60.4" height="15" rx="3" fill="#ffffff" opacity="0.92"/><text x="755.0" y="201.5" font-size="9.2" fill="#404757" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">broadcast</text><line x1="710" y1="300" x2="800" y2="320" stroke="#c4913a" stroke-width="1.5"/><path d="M800.0,320.0 L790.7,322.7 L792.7,313.6 Z" fill="#c4913a"/><rect x="708.0" y="293.0" width="94.0" height="15" rx="3" fill="#ffffff" opacity="0.92"/><text x="755.0" y="304.0" font-size="9.2" fill="#404757" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="middle">notify mentions</text><line x1="605" y1="332" x2="605" y2="470" stroke="#2e7d46" stroke-width="1.4" stroke-dasharray="4 4"/><line x1="135" y1="470" x2="605" y2="470" stroke="#2e7d46" stroke-width="1.4" stroke-dasharray="4 4"/><line x1="135" y1="470" x2="135" y2="316" stroke="#2e7d46" stroke-width="1.4" stroke-dasharray="4 4"/><path d="M135.0,316.0 L139.7,324.5 L130.3,324.5 Z" fill="#2e7d46"/><rect x="300" y="462" width="150" height="16" rx="3" fill="#ffffff" opacity="0.92"/><text x="375" y="474" font-size="9.4" fill="#2c6b3f" font-family="'Latin Modern Mono', 'DejaVu Sans Mono', 'Consolas', monospace" text-anchor="middle">ack { delivered_to }</text><line x1="60" y1="520" x2="1120" y2="520" stroke="#e9ebef" stroke-width="1"/><text x="60" y="540" font-size="9.8" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">Both transports converge on the single store_message service, then one message event is multiplexed: the standard payload broadcasts to the channel room (sender skipped),</text><text x="60" y="555" font-size="9.8" fill="#5b6472" font-family="'New Computer Modern', 'Latin Modern Roman', Georgia, 'Times New Roman', serif" text-anchor="start" font-style="italic">while flag-modified copies are emitted to the personal room of each mentioned user — unifying the client's event handlers. (@Talos mentions additionally trigger maybe_ai_reply.)</text></svg>