<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="340" viewBox="0 0 1120 340" font-family="Liberation Sans, Arial, sans-serif"><defs><marker id="arw" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#5a6270"/></marker><marker id="arwl" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#c23b6b"/></marker></defs><rect x="0" y="0" width="1120" height="340" fill="#ffffff"/><text x="30" y="40" font-size="20" font-weight="bold" fill="#1b2130">4 · build_rag_pipeline() — the one shared retrieval composition</text><rect x="30" y="120" width="120" height="66" rx="11" fill="#ffffff" stroke="#9aa3b2" stroke-width="2"/><text x="90.0" y="142" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">query</text><text x="90.0" y="165" text-anchor="middle" font-size="11.5" fill="#1b2130">(rewritten?)</text><rect x="200" y="120" width="175" height="76" rx="11" fill="#e2eefc" stroke="#2f74d0" stroke-width="2"/><text x="287.5" y="142" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">dense search</text><text x="287.5" y="165" text-anchor="middle" font-size="11.5" fill="#1b2130">fetch rerank_fetch_k</text><text x="287.5" y="182" text-anchor="middle" font-size="11.5" fill="#1b2130">(else top_k)</text><rect x="415" y="120" width="165" height="76" rx="11" fill="#e2eefc" stroke="#2f74d0" stroke-width="2"/><text x="497.5" y="142" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">+ BM25 hybrid?</text><text x="497.5" y="165" text-anchor="middle" font-size="11.5" fill="#1b2130">only if corpus given</text><text x="497.5" y="182" text-anchor="middle" font-size="11.5" fill="#1b2130">else warn → dense</text><rect x="620" y="120" width="165" height="76" rx="11" fill="#e2eefc" stroke="#2f74d0" stroke-width="2"/><text x="702.5" y="142" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">rerank?</text><text x="702.5" y="165" text-anchor="middle" font-size="11.5" fill="#1b2130">cross-encoder</text><text x="702.5" y="182" text-anchor="middle" font-size="11.5" fill="#1b2130">widen → top_k</text><rect x="825" y="120" width="165" height="76" rx="11" fill="#e2eefc" stroke="#2f74d0" stroke-width="2"/><text x="907.5" y="142" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">compress?</text><text x="907.5" y="165" text-anchor="middle" font-size="11.5" fill="#1b2130">EmbeddingsFilter</text><text x="907.5" y="182" text-anchor="middle" font-size="11.5" fill="#1b2130">/ LLM extract</text><line x1="150.0" y1="158" x2="205.5" y2="158" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><line x1="374.5" y1="158" x2="415.5" y2="158" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><line x1="584.5" y1="158" x2="620.5" y2="158" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><line x1="789.5" y1="158" x2="825.5" y2="158" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><line x1="989.5" y1="158" x2="1037.5" y2="158" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><rect x="977.7" y="141.0" width="71.60000000000001" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="1013.5" y="152.0" text-anchor="middle" font-size="11" fill="#333c4d">top_k docs</text><text x="200" y="240" font-size="12.5" fill="#5a6270">Each stage is a RagConfig toggle:  use_hybrid_retrieval · use_reranking (+rerank_fetch_k) · compression_type (+threshold).</text><text x="200" y="262" font-size="12.5" fill="#5a6270">PROD passes a Milvus store + tenant filter (search_kwargs).   EVAL passes an in-memory store + corpus (so hybrid actually runs).  Same function.</text></svg>