<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="640" viewBox="0 0 1040 640" font-family="Liberation Sans, Arial, sans-serif"><defs><marker id="arw" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#5a6270"/></marker><marker id="arwl" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#c23b6b"/></marker></defs><rect x="0" y="0" width="1040" height="640" fill="#ffffff"/><text x="30" y="40" font-size="20" font-weight="bold" fill="#1b2130">1 · System overview — one collection, writers on the left, readers on the right</text><text x="30" y="70" font-size="12.5" fill="#5a6270">WRITERS  (put vectors in)</text><rect x="30" y="88" width="300" height="78" rx="11" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="180.0" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">File ingestion</text><text x="180.0" y="133" text-anchor="middle" font-size="11.5" fill="#1b2130">upload → worker → documents.py</text><text x="180.0" y="149" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">ingest_file_chunks()  →  source="file"</text><rect x="30" y="200" width="300" height="96" rx="11" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="180.0" y="222" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">Chat indexer  (taskiq cron)</text><text x="180.0" y="245" text-anchor="middle" font-size="11.5" fill="#1b2130">every chat_index_interval_minutes</text><text x="180.0" y="261" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">index_pending_messages()</text><text x="180.0" y="277" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">→ source="chat"  (purge→ingest→stamp)</text><rect x="30" y="330" width="300" height="74" rx="11" fill="#e0f3f4" stroke="#2a9aa5" stroke-width="2"/><text x="180.0" y="352" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">Postgres — messages</text><text x="180.0" y="375" text-anchor="middle" font-size="11.5" fill="#1b2130">role · content · sent_at · indexed_at</text><text x="180.0" y="391" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">indexed_at IS NULL  = not yet indexed</text><path d="M430,163 A95.0,13 0 0 1 620,163 L620,287 A95.0,13 0 0 1 430,287 Z" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><path d="M430,163 A95.0,13 0 0 0 620,163" fill="none" stroke="#2fa559" stroke-width="2"/><text x="525.0" y="187" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">Milvus</text><text x="525.0" y="204" text-anchor="middle" font-size="11" fill="#1b2130">talos_documents</text><text x="525.0" y="221" text-anchor="middle" font-size="11" fill="#1b2130">(one collection,</text><text x="525.0" y="238" text-anchor="middle" font-size="11" fill="#1b2130">dynamic schema)</text><text x="430" y="130" font-size="12.5" fill="#5a6270">SINGLE VECTOR STORE</text><text x="720" y="70" font-size="12.5" fill="#5a6270">READERS  (query vectors)</text><rect x="720" y="88" width="300" height="66" rx="11" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="870.0" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">POST /api/channels/{id}/ask</text><text x="870.0" y="133" text-anchor="middle" font-size="11.5" fill="#1b2130">perm: channel.message:send · streams</text><rect x="720" y="176" width="300" height="92" rx="11" fill="#e6e9fb" stroke="#4a54d6" stroke-width="2"/><text x="870.0" y="198" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">RAGChain  (orchestrator)</text><text x="870.0" y="221" text-anchor="middle" font-size="11.5" fill="#1b2130">load tier-1 tail · retrieve · prompt</text><text x="870.0" y="237" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">build_rag_pipeline()  ← shared core</text><text x="870.0" y="253" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">RAG_PROMPT | llm | stream</text><rect x="720" y="292" width="300" height="60" rx="11" fill="#fde4ec" stroke="#d6417a" stroke-width="2"/><text x="870.0" y="314" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">LLM  (ChatOpenAI-compatible)</text><text x="870.0" y="337" text-anchor="middle" font-size="11.5" fill="#1b2130">streams the grounded answer</text><rect x="430" y="470" width="400" height="96" rx="11" fill="#eceef2" stroke="#7a8699" stroke-width="2"/><text x="630.0" y="492" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">Evaluation harness</text><text x="630.0" y="515" text-anchor="middle" font-size="11.5" fill="#1b2130">RagVariant over an in-memory store</text><text x="630.0" y="531" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">calls the SAME build_rag_pipeline()</text><text x="630.0" y="547" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">and the SAME RAG_PROMPT</text><text x="430" y="452" font-size="12.5" fill="#5a6270">MEASURES THE SAME CORE</text><path d="M330,127.0 Q380.0,151.0 430,195" fill="none" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><rect x="359.6" y="144.0" width="40.800000000000004" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="380.0" y="155.0" text-anchor="middle" font-size="11" fill="#333c4d">write</text><line x1="330" y1="248.0" x2="430" y2="240" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><rect x="359.6" y="227.0" width="40.800000000000004" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="380.0" y="238.0" text-anchor="middle" font-size="11" fill="#333c4d">write</text><path d="M330,367.0 Q525.0,354.5 720,222" fill="none" stroke="#2a9aa5" stroke-width="2" marker-end="url(#arw)"/><rect x="487.24" y="384" width="145.52" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="560" y="395" text-anchor="middle" font-size="11" fill="#333c4d">tier-1 tail (verbatim)</text><line x1="620" y1="210" x2="720" y2="210" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><rect x="652.68" y="193.0" width="34.64" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="670.0" y="204.0" text-anchor="middle" font-size="11" fill="#333c4d">read</text><line x1="870.0" y1="154" x2="870.0" y2="176" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><rect x="846.52" y="148.0" width="46.96" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="870.0" y="159.0" text-anchor="middle" font-size="11" fill="#333c4d">invoke</text><line x1="870.0" y1="268" x2="870.0" y2="292" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><rect x="815.72" y="263.0" width="108.56" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="870.0" y="274.0" text-anchor="middle" font-size="11" fill="#333c4d">context+question</text><path d="M630.0,470 Q695.0,329.0 760,268" fill="none" stroke="#7a8699" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arw)"/><rect x="617.28" y="419" width="65.44" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="650" y="430" text-anchor="middle" font-size="11" fill="#333c4d">same code</text><rect x="30" y="470" width="16" height="16" rx="3" fill="#e3f5e8" stroke="#2fa559" stroke-width="1.5"/><text x="52" y="483" font-size="11.5" fill="#1b2130">vector store / ingest</text><rect x="30" y="492" width="16" height="16" rx="3" fill="#e0f3f4" stroke="#2a9aa5" stroke-width="1.5"/><text x="52" y="505" font-size="11.5" fill="#1b2130">Postgres</text><rect x="30" y="514" width="16" height="16" rx="3" fill="#efe6fb" stroke="#7b3fe4" stroke-width="1.5"/><text x="52" y="527" font-size="11.5" fill="#1b2130">HTTP endpoint</text><rect x="30" y="536" width="16" height="16" rx="3" fill="#e6e9fb" stroke="#4a54d6" stroke-width="1.5"/><text x="52" y="549" font-size="11.5" fill="#1b2130">orchestrator</text><rect x="30" y="558" width="16" height="16" rx="3" fill="#fde4ec" stroke="#d6417a" stroke-width="1.5"/><text x="52" y="571" font-size="11.5" fill="#1b2130">LLM</text><rect x="30" y="580" width="16" height="16" rx="3" fill="#eceef2" stroke="#7a8699" stroke-width="1.5"/><text x="52" y="593" font-size="11.5" fill="#1b2130">evaluation</text></svg>