<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="470" viewBox="0 0 1040 470" font-family="Liberation Sans, Arial, sans-serif"><defs><marker id="arw" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#5a6270"/></marker><marker id="arwl" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#c23b6b"/></marker></defs><rect x="0" y="0" width="1040" height="470" fill="#ffffff"/><text x="30" y="40" font-size="20" font-weight="bold" fill="#1b2130">3 · Two-tier chat memory — every message is in exactly one tier</text><line x1="60" y1="250" x2="980" y2="250" stroke="#9aa3b2" stroke-width="2"/><text x="40" y="310" font-size="12.5" fill="#5a6270">older  ⟵                                                                                                        ⟶  newer (now)</text><line x1="610" y1="90" x2="610" y2="410" stroke="#d99000" stroke-width="2.5" stroke-dasharray="7 5"/><text x="610" y="85" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#b06f00">indexer boundary</text><text x="610" y="428" text-anchor="middle" font-size="11" fill="#b06f00">indexed_at stamped · sent_at &lt; now−grace</text><rect x="84" y="230" width="52" height="40" rx="7" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="110" y="255" text-anchor="middle" font-size="12" fill="#1b2130">m1</text><rect x="162" y="230" width="52" height="40" rx="7" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="188" y="255" text-anchor="middle" font-size="12" fill="#1b2130">m2</text><rect x="240" y="230" width="52" height="40" rx="7" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="266" y="255" text-anchor="middle" font-size="12" fill="#1b2130">m3</text><rect x="318" y="230" width="52" height="40" rx="7" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="344" y="255" text-anchor="middle" font-size="12" fill="#1b2130">m4</text><rect x="396" y="230" width="52" height="40" rx="7" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="422" y="255" text-anchor="middle" font-size="12" fill="#1b2130">m5</text><rect x="474" y="230" width="52" height="40" rx="7" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="500" y="255" text-anchor="middle" font-size="12" fill="#1b2130">m6</text><rect x="552" y="230" width="52" height="40" rx="7" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="578" y="255" text-anchor="middle" font-size="12" fill="#1b2130">m7</text><rect x="630" y="230" width="52" height="40" rx="7" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="656" y="255" text-anchor="middle" font-size="12" fill="#1b2130">m8</text><rect x="60" y="110" width="500" height="66" rx="11" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="310.0" y="132" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">TIER 2 · indexed SEGMENTS (semantic recall)</text><text x="310.0" y="155" text-anchor="middle" font-size="11.5" fill="#1b2130">conversation segments in Milvus · source="chat"</text><text x="310.0" y="172" text-anchor="middle" font-size="11.5" fill="#1b2130">fetch 10 → decay + redundancy re-rank → k=3</text><rect x="640" y="110" width="340" height="66" rx="11" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="810.0" y="132" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">TIER 1 · un-indexed tail (verbatim)</text><text x="810.0" y="155" text-anchor="middle" font-size="11.5" fill="#1b2130">indexed_at IS NULL · capped at chat_context_cap</text><text x="810.0" y="172" text-anchor="middle" font-size="11.5" fill="#1b2130">injected as chat_history</text><line x1="344" y1="176" x2="344" y2="228" stroke="#2fa559" stroke-width="2" marker-end="url(#arw)"/><rect x="271.24" y="185.0" width="145.52" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="344.0" y="196.0" text-anchor="middle" font-size="11" fill="#333c4d">recalled by similarity</text><line x1="734" y1="176" x2="734" y2="228" stroke="#7b3fe4" stroke-width="2" marker-end="url(#arw)"/><rect x="685.88" y="185.0" width="96.24000000000001" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="734.0" y="196.0" text-anchor="middle" font-size="11" fill="#333c4d">injected as-is</text><text x="60" y="452" font-size="12.5" fill="#5a6270">The indexer moves messages left across the boundary (stamps indexed_at). A recalled segment is dropped if ANY of its message_ids overlaps the tail.</text></svg>