<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" font-family="Liberation Sans, Arial, sans-serif"><defs><marker id="arw" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#5a6270"/></marker><marker id="arwl" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#c23b6b"/></marker></defs><rect x="0" y="0" width="1120" height="430" fill="#ffffff"/><text x="30" y="40" font-size="20" font-weight="bold" fill="#1b2130">4 · Chat memory — segments at index time, smart selection at query time</text><text x="30" y="82" font-size="12.5" fill="#5a6270">INDEX TIME  (taskiq cron, every chat_index_interval_minutes, advisory-locked)</text><rect x="30" y="100" width="170" height="76" rx="11" fill="#e0f3f4" stroke="#2a9aa5" stroke-width="2"/><text x="115.0" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">settled messages</text><text x="115.0" y="145" text-anchor="middle" font-size="11.5" fill="#1b2130">indexed_at IS NULL</text><text x="115.0" y="162" text-anchor="middle" font-size="11.5" fill="#1b2130">sent_at &lt; now − grace</text><rect x="250" y="100" width="210" height="76" rx="11" fill="#e2eefc" stroke="#2f74d0" stroke-width="2"/><text x="355.0" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">segmentation</text><text x="355.0" y="145" text-anchor="middle" font-size="11.5" fill="#1b2130">per channel, chronologic</text><text x="355.0" y="162" text-anchor="middle" font-size="11.5" fill="#1b2130">split: gap &gt; 30 min · &gt; 12 msgs</text><rect x="510" y="100" width="190" height="76" rx="11" fill="#e2eefc" stroke="#2f74d0" stroke-width="2"/><text x="605.0" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">embed + purge</text><text x="605.0" y="145" text-anchor="middle" font-size="11.5" fill="#1b2130">one vector per segment</text><text x="605.0" y="162" text-anchor="middle" font-size="11.5" fill="#1b2130">purge covers crashed ticks</text><rect x="750" y="100" width="200" height="76" rx="11" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="850.0" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">Milvus</text><text x="850.0" y="145" text-anchor="middle" font-size="11.5" fill="#1b2130">source="chat"</text><text x="850.0" y="162" text-anchor="middle" font-size="11.5" fill="#1b2130">message_ids=[…]</text><line x1="200" y1="138" x2="248" y2="138" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><line x1="460" y1="138" x2="508" y2="138" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><line x1="700" y1="138" x2="748" y2="138" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="30" y="204" font-size="12.5" fill="#5a6270">indexed_at is stamped only after ingest succeeds — a crashed tick re-selects the same batch and the purge removes its partial segments (idempotent).</text><text x="30" y="226" font-size="12.5" fill="#5a6270">Why segments: a lone "yes, let's do that" embeds meaninglessly; topic-coherent multi-turn segments outperform per-message units (SeCom, ICLR 2025).</text><text x="30" y="262" font-size="12.5" fill="#5a6270">QUERY TIME  (inside RAGChain.prepare, per /ask)</text><rect x="30" y="280" width="200" height="76" rx="11" fill="#e2eefc" stroke="#2f74d0" stroke-width="2"/><text x="130.0" y="302" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">fetch candidates</text><text x="130.0" y="325" text-anchor="middle" font-size="11.5" fill="#1b2130">similarity search</text><text x="130.0" y="342" text-anchor="middle" font-size="11.5" fill="#1b2130">k = chat_recall_fetch_k (10)</text><rect x="280" y="280" width="200" height="76" rx="11" fill="#e2eefc" stroke="#2f74d0" stroke-width="2"/><text x="380.0" y="302" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">tail dedupe</text><text x="380.0" y="325" text-anchor="middle" font-size="11.5" fill="#1b2130">drop segment if ANY</text><text x="380.0" y="342" text-anchor="middle" font-size="11.5" fill="#1b2130">message_id is in tier-1</text><rect x="530" y="280" width="250" height="76" rx="11" fill="#e2eefc" stroke="#2f74d0" stroke-width="2"/><text x="655.0" y="302" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">decay + redundancy</text><text x="655.0" y="325" text-anchor="middle" font-size="11.5" fill="#1b2130">rank·(0.25+0.75·½^(age/168h))</text><text x="655.0" y="342" text-anchor="middle" font-size="11.5" fill="#1b2130">skip Jaccard-overlap &gt; 0.6</text><rect x="830" y="280" width="160" height="76" rx="11" fill="#e6e9fb" stroke="#4a54d6" stroke-width="2"/><text x="910.0" y="302" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">context</text><text x="910.0" y="325" text-anchor="middle" font-size="11.5" fill="#1b2130">k = chat_recall_k (3)</text><text x="910.0" y="342" text-anchor="middle" font-size="11.5" fill="#1b2130">→ RAG_PROMPT</text><line x1="230" y1="318" x2="278" y2="318" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><line x1="480" y1="318" x2="528" y2="318" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><line x1="780" y1="318" x2="828" y2="318" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="30" y="396" font-size="12.5" fill="#5a6270">Selection is a pure function (select_chat_context) — and the whole recall path degrades to file-only context on ANY failure; it can never kill the answer.</text></svg>