<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="634" viewBox="0 0 1040 634" font-family="Liberation Sans, Arial, sans-serif"><defs><marker id="arw" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#5a6270"/></marker><marker id="arwl" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#c23b6b"/></marker></defs><rect x="0" y="0" width="1040" height="634" fill="#ffffff"/><text x="30" y="40" font-size="20" font-weight="bold" fill="#1b2130">2 · Lifecycle of one /ask request</text><rect x="22" y="70" width="116" height="34" rx="8" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="80" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">Client</text><line x1="80" y1="120" x2="80" y2="592" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><rect x="167" y="70" width="116" height="46" rx="8" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="225" y="89" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">Router</text><text x="225" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">/ask</text><line x1="225" y1="120" x2="225" y2="592" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><rect x="312" y="70" width="116" height="34" rx="8" fill="#e0f3f4" stroke="#2a9aa5" stroke-width="2"/><text x="370" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">Postgres</text><line x1="370" y1="120" x2="370" y2="592" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><rect x="452" y="70" width="116" height="34" rx="8" fill="#e6e9fb" stroke="#4a54d6" stroke-width="2"/><text x="510" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">RAGChain</text><line x1="510" y1="120" x2="510" y2="592" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><rect x="592" y="70" width="116" height="34" rx="8" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="650" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">Milvus</text><line x1="650" y1="120" x2="650" y2="592" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><rect x="732" y="70" width="116" height="34" rx="8" fill="#fde4ec" stroke="#d6417a" stroke-width="2"/><text x="790" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">LLM</text><line x1="790" y1="120" x2="790" y2="592" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><rect x="877" y="70" width="116" height="46" rx="8" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="935" y="89" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">Socket.IO</text><text x="935" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">room</text><line x1="935" y1="120" x2="935" y2="592" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><line x1="80" y1="130" x2="225" y2="130" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="152.5" y="124" text-anchor="middle" font-size="11.5" fill="#333c4d">POST question (+debug?)</text><line x1="225" y1="174" x2="370" y2="174" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="297.5" y="168" text-anchor="middle" font-size="11.5" fill="#333c4d">load un-indexed tail (tier-1) + ids  (SYSTEM rows skipped)</text><rect x="150" y="196" width="860" height="146" rx="6" fill="#f3f6fb" opacity="0.75"/><text x="1002" y="211" font-size="10.5" font-weight="bold" text-anchor="end" fill="#8a93a3">worker thread (asyncio.to_thread)</text><line x1="225" y1="234" x2="510" y2="234" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="367.5" y="228" text-anchor="middle" font-size="11.5" fill="#333c4d">build + prepare(question)   → 502 if retrieval fails</text><line x1="510" y1="276" x2="650" y2="276" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="580.0" y="270" text-anchor="middle" font-size="11.5" fill="#333c4d">FILE chunks  (workspace + source=file)</text><line x1="510" y1="316" x2="650" y2="316" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="580.0" y="310" text-anchor="middle" font-size="11.5" fill="#333c4d">CHAT segments (channel + source=chat) → dedupe → decay+select</text><rect x="150" y="344" width="860" height="118" rx="6" fill="#f3f6fb" opacity="0.75"/><text x="1002" y="359" font-size="10.5" font-weight="bold" text-anchor="end" fill="#8a93a3">threadpool iteration (iterate_in_threadpool)</text><line x1="510" y1="380" x2="790" y2="380" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="650.0" y="374" text-anchor="middle" font-size="11.5" fill="#333c4d">RAG_PROMPT(context, question, tail)</text><line x1="790" y1="422" x2="80" y2="422" stroke="#c23b6b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arwl)"/><text x="435.0" y="416" text-anchor="middle" font-size="11.5" fill="#333c4d">stream tokens   ([ask:error] marker if generation dies)</text><line x1="225" y1="478" x2="370" y2="478" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="297.5" y="472" text-anchor="middle" font-size="11.5" fill="#333c4d">persist question + answer TOGETHER (only on success)</text><line x1="225" y1="522" x2="935" y2="522" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="580.0" y="516" text-anchor="middle" font-size="11.5" fill="#333c4d">emit ai_message to channel room  (best-effort)</text><line x1="225" y1="566" x2="80" y2="566" stroke="#c23b6b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arwl)"/><text x="152.5" y="560" text-anchor="middle" font-size="11.5" fill="#333c4d">__ASK_DEBUG__ + RagTrace JSON (if debug)</text><text x="80" y="610" font-size="12.5" fill="#5a6270">Disconnect mid-stream → nothing persisted (no orphaned questions).  Retrieval failure → real 502 before any bytes.  Loop stays ~1 ms throughout.</text></svg>