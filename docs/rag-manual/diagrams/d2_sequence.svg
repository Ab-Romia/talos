<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="700" viewBox="0 0 1040 700" font-family="Liberation Sans, Arial, sans-serif"><defs><marker id="arw" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#5a6270"/></marker><marker id="arwl" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#c23b6b"/></marker></defs><rect x="0" y="0" width="1040" height="700" fill="#ffffff"/><text x="30" y="40" font-size="20" font-weight="bold" fill="#1b2130">2 · Lifecycle of one /ask request</text><rect x="32" y="70" width="116" height="34" rx="8" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="90" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">Client</text><line x1="90" y1="120" x2="90" y2="660" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><rect x="192" y="70" width="116" height="46" rx="8" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="250" y="89" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">Router</text><text x="250" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">/ask</text><line x1="250" y1="120" x2="250" y2="660" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><rect x="352" y="70" width="116" height="34" rx="8" fill="#e0f3f4" stroke="#2a9aa5" stroke-width="2"/><text x="410" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">Postgres</text><line x1="410" y1="120" x2="410" y2="660" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><rect x="502" y="70" width="116" height="34" rx="8" fill="#e6e9fb" stroke="#4a54d6" stroke-width="2"/><text x="560" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">RAGChain</text><line x1="560" y1="120" x2="560" y2="660" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><rect x="672" y="70" width="116" height="34" rx="8" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="730" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">Milvus</text><line x1="730" y1="120" x2="730" y2="660" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><rect x="842" y="70" width="116" height="34" rx="8" fill="#fde4ec" stroke="#d6417a" stroke-width="2"/><text x="900" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2130">LLM</text><line x1="900" y1="120" x2="900" y2="660" stroke="#c4cbd6" stroke-width="1.5" stroke-dasharray="3 4"/><line x1="90" y1="120" x2="250" y2="120" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="170.0" y="114" text-anchor="middle" font-size="11.5" fill="#333c4d">POST question (+debug?)</text><line x1="250" y1="166" x2="410" y2="166" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="330.0" y="160" text-anchor="middle" font-size="11.5" fill="#333c4d">load un-indexed tail (tier-1) + ids</text><line x1="250" y1="212" x2="410" y2="212" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="330.0" y="206" text-anchor="middle" font-size="11.5" fill="#333c4d">persist user question</text><line x1="250" y1="258" x2="560" y2="258" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="405.0" y="252" text-anchor="middle" font-size="11.5" fill="#333c4d">construct(config, ws, channel, tail, exclude_ids)</text><line x1="560" y1="304" x2="730" y2="304" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="645.0" y="298" text-anchor="middle" font-size="11.5" fill="#333c4d">retrieve FILE chunks  (expr: workspace + source=file)</text><line x1="560" y1="350" x2="730" y2="350" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="645.0" y="344" text-anchor="middle" font-size="11.5" fill="#333c4d">retrieve CHAT chunks  (expr: channel + source=chat, minus tail)</text><line x1="560" y1="396" x2="900" y2="396" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="730.0" y="390" text-anchor="middle" font-size="11.5" fill="#333c4d">RAG_PROMPT(context, question, tail)</text><line x1="900" y1="442" x2="560" y2="442" stroke="#c23b6b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arwl)"/><text x="730.0" y="436" text-anchor="middle" font-size="11.5" fill="#333c4d">stream tokens</text><line x1="560" y1="488" x2="90" y2="488" stroke="#c23b6b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arwl)"/><text x="325.0" y="482" text-anchor="middle" font-size="11.5" fill="#333c4d">stream answer  (+ __ASK_DEBUG__ trace if debug)</text><line x1="560" y1="528" x2="410" y2="528" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="485.0" y="522" text-anchor="middle" font-size="11.5" fill="#333c4d">persist assistant answer  ·  fill RagTrace</text><text x="90" y="568" font-size="12.5" fill="#5a6270">Tier-1 = recent un-indexed messages injected verbatim.  Tier-2 = older indexed messages recalled from Milvus.  The two never overlap (exclude_ids).</text></svg>