<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" font-family="Liberation Sans, Arial, sans-serif"><defs><marker id="arw" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#5a6270"/></marker><marker id="arwl" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#c23b6b"/></marker></defs><rect x="0" y="0" width="1040" height="560" fill="#ffffff"/><text x="30" y="40" font-size="20" font-weight="bold" fill="#1b2130">6 · The three chokepoints you must hold in your head</text><text x="30" y="78" font-size="12.5" fill="#5a6270">A · RagConfig  →  reaches every component through a real  config=  seam</text><rect x="30" y="100" width="200" height="96" rx="11" fill="#fdf0d5" stroke="#d99000" stroke-width="2"/><text x="130.0" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">RagConfig</text><text x="130.0" y="145" text-anchor="middle" font-size="11.5" fill="#1b2130">one env-driven object</text><text x="130.0" y="162" text-anchor="middle" font-size="11.5" fill="#1b2130">global_rag_config</text><text x="130.0" y="179" text-anchor="middle" font-size="11.5" fill="#1b2130">(the only place knobs live)</text><rect x="360" y="92" width="380" height="150" rx="11" fill="#e2eefc" stroke="#2f74d0" stroke-width="2"/><text x="550.0" y="114" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">Every factory takes  config= :</text><text x="376" y="138" font-size="12" font-family="Liberation Mono, monospace" fill="#1b2130">get_llm(config=…)</text><text x="376" y="156" font-size="12" font-family="Liberation Mono, monospace" fill="#1b2130">get_embeddings(config=…)</text><text x="376" y="174" font-size="12" font-family="Liberation Mono, monospace" fill="#1b2130">get_hyde_embeddings(config=…)</text><text x="376" y="192" font-size="12" font-family="Liberation Mono, monospace" fill="#1b2130">get_query_rewriter(config=…)</text><text x="376" y="210" font-size="12" font-family="Liberation Mono, monospace" fill="#1b2130">compression_retriever(config=…)</text><text x="376" y="228" font-size="12" font-family="Liberation Mono, monospace" fill="#1b2130">build_rag_pipeline(config=…)</text><line x1="230" y1="148" x2="358" y2="150" stroke="#d99000" stroke-width="2" marker-end="url(#arw)"/><text x="775" y="150" font-size="12" fill="#5a6270">change one field →</text><text x="775" y="170" font-size="12" fill="#5a6270">every consumer moves,</text><text x="775" y="190" font-size="12" fill="#5a6270">in prod AND eval.</text><line x1="30" y1="270" x2="1010" y2="270" stroke="#e2e6ee" stroke-width="1.5"/><text x="30" y="306" font-size="12.5" fill="#5a6270">B · RagTrace  ←  filled once per run  →  read by every debug surface (one schema)</text><rect x="30" y="322" width="200" height="80" rx="11" fill="#e6e9fb" stroke="#4a54d6" stroke-width="2"/><text x="130.0" y="344" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">RAGChain</text><text x="130.0" y="367" text-anchor="middle" font-size="11.5" fill="#1b2130">fills self.trace</text><text x="130.0" y="383" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">prepare + stream_answer</text><rect x="300" y="322" width="220" height="96" rx="11" fill="#eef1f6" stroke="#55617a" stroke-width="2"/><text x="410.0" y="344" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">RagTrace</text><text x="410.0" y="367" text-anchor="middle" font-size="11.5" fill="#1b2130">model · effective_config</text><text x="410.0" y="384" text-anchor="middle" font-size="11.5" fill="#1b2130">rewritten_query · candidates</text><text x="410.0" y="401" text-anchor="middle" font-size="11.5" fill="#1b2130">final_context · exact prompt</text><line x1="230" y1="362" x2="300" y2="366" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><rect x="238.44" y="347.0" width="53.120000000000005" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="265.0" y="358.0" text-anchor="middle" font-size="11" fill="#333c4d">produce</text><rect x="620" y="316" width="240" height="34" rx="11" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="740" y="338" text-anchor="middle" font-size="12.5" fill="#1b2130">/ask  {debug:true}</text><line x1="520" y1="370" x2="618" y2="333" stroke="#55617a" stroke-width="2" marker-end="url(#arw)"/><rect x="620" y="360" width="240" height="34" rx="11" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="740" y="382" text-anchor="middle" font-size="12.5" fill="#1b2130">scripts/debug_ask.py</text><line x1="520" y1="370" x2="618" y2="377" stroke="#55617a" stroke-width="2" marker-end="url(#arw)"/><rect x="620" y="404" width="240" height="34" rx="11" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="740" y="426" text-anchor="middle" font-size="12.5" fill="#1b2130">chat-ui  🔍 toggle</text><line x1="520" y1="370" x2="618" y2="421" stroke="#55617a" stroke-width="2" marker-end="url(#arw)"/><line x1="30" y1="450" x2="1010" y2="450" stroke="#e2e6ee" stroke-width="1.5"/><text x="30" y="486" font-size="12.5" fill="#5a6270">C · build_rag_pipeline  →  the only place retrieval logic lives (see diagram 4). Edit it once; production and evaluation both change.</text><text x="30" y="516" font-size="12.5" fill="#5a6270">Master these three — all knobs, all retrieval, all observability — and you can scale, debug, and fix any part of the system.</text></svg>