<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" font-family="Liberation Sans, Arial, sans-serif"><defs><marker id="arw" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#5a6270"/></marker><marker id="arwl" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#c23b6b"/></marker></defs><rect x="0" y="0" width="1040" height="500" fill="#ffffff"/><text x="30" y="40" font-size="20" font-weight="bold" fill="#1b2130">6 · Eval == ship — evaluation drives the production code</text><rect x="60" y="100" width="220" height="70" rx="11" fill="#e3f5e8" stroke="#2fa559" stroke-width="2"/><text x="170.0" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">Milvus (talos_documents)</text><text x="170.0" y="145" text-anchor="middle" font-size="11.5" fill="#1b2130">approximate ANN search</text><text x="60" y="92" font-size="12.5" fill="#5a6270">PRODUCTION</text><rect x="60" y="330" width="220" height="70" rx="11" fill="#eceef2" stroke="#7a8699" stroke-width="2"/><text x="170.0" y="352" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">InMemoryVectorStore</text><text x="170.0" y="375" text-anchor="middle" font-size="11.5" fill="#1b2130">exact cosine · synthetic corpus</text><text x="60" y="322" font-size="12.5" fill="#5a6270">EVALUATION</text><rect x="430" y="190" width="320" height="130" rx="11" fill="#e2eefc" stroke="#2f74d0" stroke-width="2"/><text x="590.0" y="212" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">SHARED CORE</text><text x="590.0" y="234" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">build_rag_pipeline(config, store)</text><text x="590.0" y="250" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">RAG_PROMPT | llm | parse</text><text x="590.0" y="266" text-anchor="middle" font-size="10.5" font-family="Liberation Mono, monospace" fill="#33405a">RagConfig  (VariantConfig→RagConfig)</text><text x="590" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f74d0">same functions · same prompt · same config path</text><line x1="280" y1="135" x2="430" y2="225" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><rect x="306.88" y="163.0" width="96.24000000000001" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="355.0" y="174.0" text-anchor="middle" font-size="11" fill="#333c4d">store injected</text><line x1="280" y1="365" x2="430" y2="285" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><rect x="306.88" y="308.0" width="96.24000000000001" height="18" rx="4" fill="#ffffff" opacity="0.92"/><text x="355.0" y="319.0" text-anchor="middle" font-size="11" fill="#333c4d">store injected</text><rect x="820" y="120" width="190" height="66" rx="11" fill="#efe6fb" stroke="#7b3fe4" stroke-width="2"/><text x="915.0" y="142" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">/ask answer</text><text x="915.0" y="165" text-anchor="middle" font-size="11.5" fill="#1b2130">what users get</text><rect x="820" y="320" width="190" height="76" rx="11" fill="#eef1f6" stroke="#55617a" stroke-width="2"/><text x="915.0" y="342" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2130">ablation report</text><text x="915.0" y="365" text-anchor="middle" font-size="11.5" fill="#1b2130">9 variants · IR + judge</text><text x="915.0" y="382" text-anchor="middle" font-size="11.5" fill="#1b2130">picks the shipped default</text><line x1="750" y1="235" x2="820" y2="153" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><line x1="750" y1="275" x2="820" y2="350" stroke="#5a6270" stroke-width="2" marker-end="url(#arw)"/><text x="60" y="445" font-size="12.5" fill="#5a6270">production_default is DERIVED from global_rag_config, so the measured row is always the deployed config.</text><text x="60" y="467" font-size="12.5" fill="#5a6270">The one deliberate difference is the store: approximate ANN (prod) vs exact cosine (eval).</text></svg>