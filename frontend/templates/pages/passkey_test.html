<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Passkey Test</title>
    <style>
      body {
        font-family: monospace;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
      }

      button {
        margin: 6px 4px;
        padding: 8px 14px;
        cursor: pointer;
      }

      input {
        margin: 4px;
        padding: 6px;
        width: 260px;
      }

      #log {
        background: #111;
        color: #0f0;
        padding: 12px;
        margin-top: 20px;
        white-space: pre-wrap;
        min-height: 80px;
        font-size: 12px;
      }

      .section {
        border: 1px solid #ccc;
        padding: 14px;
        margin: 14px 0;
        border-radius: 4px;
      }

      h3 {
        margin-top: 0;
      }
    </style>
</head>
<body>
<h2>🔑 Passkey Test Page</h2>
<p>Logged in as: <strong>{{ username or "anonymous" }}</strong></p>

<div class="section">
    <h3>Register Passkey <small>(requires login + sudo token)</small></h3>
    <input id="passkey-name" placeholder="Passkey name (e.g. My YubiKey)"/>
    <br>
    <button onclick="registerPasskey()">Register Passkey</button>
</div>

<div class="section">
    <h3>Login with Passkey</h3>
    <button onclick="loginWithPasskey()">Login with Passkey</button>
</div>

<div id="log">Ready.</div>

<script>
  const log = (...args) => {
    document.getElementById("log").textContent += "\n" + args.map(a =>
      typeof a === "object" ? JSON.stringify(a, null, 2) : a
    ).join(" ");
  };

  // Base64url helpers (WebAuthn uses base64url, not standard base64)
  const b64urlToBuffer = str =>
    Uint8Array.from(atob(str.replace(/-/g, "+").replace(/_/g, "/")), c => c.charCodeAt(0));

  const bufferToB64url = buf =>
    btoa(String.fromCharCode(...new Uint8Array(buf)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");

  // Recursively decode base64url strings in WebAuthn options objects into ArrayBuffers
  function decodeOptions(obj) {
    if (typeof obj === "string") return b64urlToBuffer(obj);
    if (Array.isArray(obj)) return obj.map(decodeOptions);
    if (obj && typeof obj === "object") {
      return Object.fromEntries(Object.entries(obj).map(([k, v]) => {
        const bufferFields = ["challenge", "id", "userId"];
        return [k, bufferFields.includes(k) ? b64urlToBuffer(v) : decodeOptions(v)];
      }));
    }
    return obj;
  }

  // Encode a PublicKeyCredential into a JSON-serialisable object
  function encodeCredential(cred) {
    const obj = {id: cred.id, rawId: bufferToB64url(cred.rawId), type: cred.type};
    const r = cred.response;
    if (r.attestationObject) {
      obj.response = {
        clientDataJSON: bufferToB64url(r.clientDataJSON),
        attestationObject: bufferToB64url(r.attestationObject),
      };
    } else {
      obj.response = {
        clientDataJSON: bufferToB64url(r.clientDataJSON),
        authenticatorData: bufferToB64url(r.authenticatorData),
        signature: bufferToB64url(r.signature),
        userHandle: r.userHandle ? bufferToB64url(r.userHandle) : null,
      };
    }
    return obj;
  }

  async function registerPasskey() {
    const name = document.getElementById("passkey-name").value.trim() || "My Passkey";
    log("→ Generating registration options...");
    try {
      const genRes = await fetch("/api/auth/passkey/generate", {method: "POST", credentials: "include"});
      if (!genRes.ok) {
        log("✗ Generate failed:", await genRes.text());
        return;
      }
      const {options, jwt_challenge} = await genRes.json();
      log("✓ Options received");

      options.user.id = b64urlToBuffer(options.user.id);

      const credential = await navigator.credentials.create({publicKey: options});
      log("✓ Authenticator responded");

      const params = new URLSearchParams({
        jwt_challenge,
        credential: JSON.stringify(encodeCredential(credential)),
        name,
      });
      const regRes = await fetch("/api/auth/passkey/register?" + params, {method: "POST", credentials: "include"});
      const data = await regRes.json();
      if (regRes.ok) log("✓ Registered:", data);
      else log("✗ Registration failed:", data);
    } catch (e) {
      log("✗ Error:", e.message);
      console.log(e);
    }
  }

  async function loginWithPasskey() {
    log("→ Generating authentication options...");
    try {
      const genRes = await fetch("/api/auth/passkey/generate", {method: "POST", credentials: "include"});
      if (!genRes.ok) {
        log("✗ Generate failed:", await genRes.text());
        return;
      }
      const {options, jwt_challenge} = await genRes.json();
      log("✓ Options received");

      const parsedOptions = decodeOptions(JSON.parse(options));
      const credential = await navigator.credentials.get({publicKey: parsedOptions});
      log("✓ Authenticator responded");

      const params = new URLSearchParams({
        jwt_challenge,
        credential: JSON.stringify(encodeCredential(credential)),
      });
      const verRes = await fetch("/api/auth/passkey/verify?" + params, {method: "POST", credentials: "include"});
      const data = await verRes.json();
      if (verRes.ok) log("✓ Logged in:", data);
      else log("✗ Login failed:", data);
    } catch (e) {
      log("✗ Error:", e.message);
    }
  }
</script>
</body>
</html>
