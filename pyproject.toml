[project]
name = "graduation-project"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13, <3.15"
dependencies = [
    "authlib>=1.6.8",
    "basedpyright>=1.38.2",
    "bcrypt>=5.0.0",
    "black>=26.1.0",
    "fastapi[all]>=0.134.0",
    "itsdangerous>=2.2.0",
    "jinja2>=3.1.6",
    "langchain>=1.2.10",
    "minio>=7.2.20",
    "numpy>=2.4.2",
    "openai>=2.24.0",
    "psycopg2-binary>=2.9.11",
    "pyotp>=2.9.0",
    "python-dotenv>=1.2.1",
    "python-jose>=3.5.0",
    "python-magic>=0.4.27",
    "python-multipart>=0.0.22",
    "rank-bm25>=0.2.2",
    "sentence-transformers>=5.1.3",
    "torch>=2.10.0",
    "sqlalchemy>=2.0.47",
    "starlette>=0.52.1",
    "uvicorn>=0.41.0",
    "arq>=0.27.0",
    "pillow>=12.1.1",
    "langchain-text-splitters>=1.1.1",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "httpx>=0.28",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
markers = [
    "unit: pure logic tests, no external services",
    "integration: requires test PostgreSQL from docker-compose",
]

[tool.uv.sources]
torch = { index = "pytorch-cpu" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
