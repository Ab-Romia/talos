dependencies = [
    "fastapi>=0.128.0",
    "uvicorn>=0.40.0",
    "jinja2>=3.1.6",
    "langchain>=0.3.0",
    "langchain-openai>=0.2.0",
    "langchain-community>=0.3.0",
    "langchain-milvus>=0.1.0",
    "pymilvus>=2.4.0",
    "sentence-transformers>=2.2.0",
    "numpy>=1.24.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.2.1",
    "pyyaml>=6.0",
    "pypdf>=3.0.0",
    "unstructured>=0.16.0",
    "psycopg2-binary>=2.9.11",
    "sqlmodel>=0.0.27",
    "rank-bm25>=0.2.2",
    "basedpyright>=1.36.2",
