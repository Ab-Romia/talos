[project]
name = "graduation-project"
version = "1.0.0"
description = "Production-ready modular RAG system with CLaRa-inspired optimizations"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    # Web framework
    "fastapi>=0.124.0",
    "jinja2>=3.1.6",
    "uvicorn>=0.38.0",

    # LLM & Embeddings
    "openai>=2.9.0",
    "langchain>=1.1.2",
    "langchain-openai>=0.1.0",

    # Vector store
    "pymilvus>=2.4.0",

    # ML & NLP
    "numpy>=1.24.0",
    "sentence-transformers>=2.2.0",
    "rank-bm25>=0.2.2",

    # Configuration & Validation
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.2.1",

    # Database
    "psycopg2-binary>=2.9.11",
    "sqlalchemy>=2.0.44",

    # Authentication
    "bcrypt>=5.0.0",
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",

    # Document processing
    "pypdf>=3.0.0",
    "python-multipart>=0.0.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
]
anthropic = [
    "anthropic>=0.25.0",
]
cohere = [
    "cohere>=4.0.0",
]
