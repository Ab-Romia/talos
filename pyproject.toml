[project]
name = "graduation-project"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13, <3.15"
dependencies = [
    "bcrypt>=5.0.0",
    "pyotp>=2.9.0",
    #
    "fastapi[all]>=0.134.0",
    "jinja2>=3.1.6",
    "langchain>=1.2.10",
    "langchain-openai>=0.3.0",
    "langchain-milvus>=0.2.0",
    "langchain-unstructured>=0.1.0",
    "unstructured[pdf]>=0.16.0",
    "langchain-community>=0.3.0",
    "langchain-huggingface>=0.1.0",
    "langchain-classic>=0.1.0",
    "pymilvus>=2.4.0",
    "numpy>=2.4.2",
    "openai>=2.24.0",
    "psycopg2-binary>=2.9.11",
    "python-multipart>=0.0.22",
    "rank-bm25>=0.2.2",
    #    "sentence-transformers>=5.1.3",
    #
    "sqlalchemy>=2.0.48",
    "starlette>=0.52.1",
    "uvicorn>=0.41.0",
    "webauthn>=2.7.1",
    "authlib>=1.6.9",
    "qrcode[pil]>=8.2",
    "joserfc>=1.6.3",
    "black>=26.3.1",
    # File upload & processing
    "minio>=7.2.20",
    "arq>=0.27.0",
    "pillow>=12.1.1",
    "langchain-text-splitters>=1.1.1",
    "python-magic>=0.4.27",
    "python-dotenv>=1.2.1",
    "sentence-transformers>=5.1.3",
    "torch>=2.10.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-mock>=3.14.0",
    "faker>=40.8.0",
]

[dependency-groups]
dev = [
    "alembic>=1.18.4",
    "basedpyright>=1.38.2",
    "types-authlib>=1.6.9.20260303",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-mock>=3.14.0",
    "faker>=40.8.0",
]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
asyncio_mode = "auto"
markers = [
    "unit: Unit tests (no external deps)",
    "integration: Integration tests (need DB)",
]

[tool.uv.sources]
torch = { index = "pytorch-cpu" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.pyright]
extraPaths = [
    "src",
    "."
]
