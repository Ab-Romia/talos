[project]
name = "Talos: AI-Augmented Collaboration Platform"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.128.0",
    "uvicorn>=0.40.0",
    "bcrypt>=5.0.0",
    "jinja2>=3.1.6",

    "langchain>=0.3.0",
    "langchain-openai>=0.2.0",
    "langchain-community>=0.3.0",
    "langchain-milvus>=0.1.0",
    "langchain-unstructured[local]>=1.0.1",
    "langchain-huggingface>=1.2.0",
    "sentence-transformers>=5.1.2",
    "unstructured[md]>=0.15.14",
    "pymilvus>=2.6.5",
    "pypdf>=3.0.0",

    "numpy>=1.24.0",
    "rank-bm25>=0.2.2",

    "python-dotenv>=1.2.1",
    "pyyaml>=6.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "sqlalchemy>=2.0.44",

    "psycopg2-binary>=2.9.11",
]

[dependency-groups]
dev = [
    "black>=25.12.0",
    "gdown>=5.2.0",
    "pyrefly>=0.46.1",
    "pytest>=9.0.2",
    "basedpyright>=1.36.2",
]
