services:
  app:
    build:
      context: .
      target: app
    hostname: talos-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MILVUS_HOST: milvus-standalone
      HF_HOME: /models/hf
    volumes:
      - hf_cache:/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    profiles: ["async"]   # async taskiq worker (notifications); not needed for FE<->BE integration
    build:
      context: .
      target: worker
    hostname: talos-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-talos_app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-talos}
      MILVUS_HOST: milvus-standalone
      MINIO__INTERNAL_ENDPOINT: minio:9000
      MINIO__EXTERNAL_ENDPOINT: ${MINIO_EXTERNAL_ENDPOINT:-localhost:9000}
      REDIS__URL: redis://redis:6379
      HF_HOME: /models/hf
    volumes:
      - hf_cache:/models
    command: [ "taskiq", "worker", "broker:broker", "notifications.tasks", "processing.tasks", "processing.chat_tasks", "integrations.slack.tasks", "--app-dir=src" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    profiles: ["async"]   # cron source for chat-memory indexing; pairs with the worker
    build:
      context: .
      target: worker
    hostname: talos-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-talos_app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-talos}
      MILVUS_HOST: milvus-standalone
      REDIS__URL: redis://redis:6379
      HF_HOME: /models/hf
    volumes:
      - hf_cache:/models
    command: [ "taskiq", "scheduler", "scheduler:scheduler", "processing.chat_tasks", "--app-dir=src" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp:
    profiles: ["integrations"]   # FastMCP server (Jira/GitHub/Slack tools)
    build:
      context: .
      target: mcp
    hostname: talos-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-talos_app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-talos}
      MILVUS_HOST: milvus-standalone
      MINIO__INTERNAL_ENDPOINT: minio:9000
      MINIO__EXTERNAL_ENDPOINT: ${MINIO_EXTERNAL_ENDPOINT:-localhost:9000}
      REDIS__URL: redis://redis:6379
      MCP__HOST: 0.0.0.0
      MCP__PORT: "8001"
    command: [ "python", "-m", "integrations.mcp_server" ]
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:latest
    hostname: postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE__USER}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD}
      POSTGRES_DB: ${DATABASE__NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talos_app} -d ${POSTGRES_DB:-talos}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-test:
    profiles: ["test"]   # only for the test suite
    image: postgres:latest
    hostname: postgres-test
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE__USER}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD}
      POSTGRES_DB: ${DATABASE__NAME}_test
    ports:
      - "5433:5432"

  etcd:
    profiles: ["rag"]   # Milvus dependency (vector store) - RAG only
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.6.7
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio
    env_file:
      - .env
    environment:
      MINIO_ACCESS_KEY: ${MINIO__ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO__SECRET_KEY}
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # create bucket and set alias for minio client
  minio-init:
    container_name: minio-init
    image: minio/mc
    env_file:
      - .env
    environment:
      MINIO_ACCESS_KEY: ${MINIO__ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO__SECRET_KEY}
    entrypoint: [""]   # clear the image's default `mc` entrypoint so /bin/sh runs
    command: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO__ACCESS_KEY} ${MINIO__SECRET_KEY};
        mc mb local/talos || true;
      "
    depends_on:
      minio:
        condition: service_healthy

  redis:
    image: redis:latest
    hostname: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  milvus-standalone:
    profiles: ["rag"]   # vector store - RAG only, not needed for FE<->BE integration
    container_name: milvus-standalone
    image: milvusdb/milvus
    command: [ "milvus", "run", "standalone" ]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"

volumes:
  postgres_data:
  milvus_data:
  etcd_data:
  minio_data:
  redis_data:
  hf_cache:

networks:
  default:
    name: talos-network
